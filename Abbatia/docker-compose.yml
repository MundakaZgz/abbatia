version: '3.8'

services:
  app:
    image: my-abbatia:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-abbatia}
      DB_USER: ${DB_USER:-abbatia_inet}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_PROCESS_USER: ${DB_PROCESS_USER:-abbatia_inet}
      DB_PROCESS_PASSWORD: ${DB_PROCESS_PASSWORD:-change_me}
      MANAGER_USER: ${MANAGER_USER:-admin}
      MANAGER_PASSWORD: ${MANAGER_PASSWORD:-admin}
      ABBATIA_AUTO_APPROVE_REGISTRATION: ${ABBATIA_AUTO_APPROVE_REGISTRATION:-true}
      MAIL_FROM: ${MAIL_FROM:-noreply@abbatia.local}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-mailhog}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-1025}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_SSL: ${MAIL_SMTP_SSL:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASS: ${MAIL_SMTP_PASS:-}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_UI_PORT:-8025}:8025"

  db:
    image: mysql:5.7
    command: ["--lower_case_table_names=1", "--sql_mode="]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-abbatia}
      MYSQL_USER: ${DB_USER:-abbatia_inet}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    ports:
      - "${DB_EXPOSED_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 20s
      timeout: 20s
      retries: 15
      start_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  db-data:
